    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This error often occurs when a library tries to polyfill fetch in an environment where it's protected.
      (function() {
        const originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Attempt to overwrite window.fetch suppressed.');
              },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.warn('Could not redefine window.fetch, it might be non-configurable:', e.message);
          }
        }
      })();
    </script>
